name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality (${{ matrix.os }}, Bun latest)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      # Randomized run with bundler tests gated off (Bun.build cross-worker
      # races make them flaky under --randomize — they're run sequentially
      # in the next step).
      - name: Tests (randomized, bundler gated)
        run: bun run test:core -- --randomize --retry=2 --seed=${{ github.run_id }}
        env:
          MANDU_SKIP_BUNDLER_TESTS: "1"
      - name: Tests (bundler, sequential)
        run: bun test packages/core/src/bundler/build.test.ts packages/core/tests/bundler/dev-common-dir.test.ts --retry=2
      - run: bun run test:cli -- --randomize --retry=2 --seed=${{ github.run_id }}
      - run: bun run test:mcp -- --randomize --retry=2 --seed=${{ github.run_id }}
      - run: bun run test:ate -- --randomize --retry=2 --seed=${{ github.run_id }}

  compatibility:
    name: Compatibility (ubuntu-latest, Bun 1.3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.12
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - name: Tests (randomized, bundler gated)
        run: bun run test:core -- --randomize --retry=2 --seed=${{ github.run_id }}
        env:
          MANDU_SKIP_BUNDLER_TESTS: "1"
      - name: Tests (bundler, sequential)
        run: bun test packages/core/src/bundler/build.test.ts packages/core/tests/bundler/dev-common-dir.test.ts --retry=2
      - run: bun run test:cli -- --randomize --retry=2 --seed=${{ github.run_id }}
      - run: bun run test:mcp -- --randomize --retry=2 --seed=${{ github.run_id }}
      - run: bun run test:ate -- --randomize --retry=2 --seed=${{ github.run_id }}

  db-integration:
    name: DB Integration (Postgres + MySQL)
    # Isolated from `quality` so a transient docker-hub pull flake or db
    # regression doesn't mask unrelated breakage. Mandatory on every PR —
    # failures here mean our cross-dialect contract is broken.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile

      - name: Start Postgres + MySQL via compose
        run: |
          docker compose -f packages/core/tests/fixtures/db/docker-compose.yml up -d
          docker compose -f packages/core/tests/fixtures/db/docker-compose.yml ps

      - name: Wait for databases to report healthy
        run: |
          # Poll `docker compose ps` until BOTH services read "healthy".
          # MySQL usually takes 15-20 s on a cold volume; Postgres 3-5 s.
          # 90 s cap — beyond that, something is wrong and we want to fail
          # the job rather than hang.
          for i in $(seq 1 90); do
            status=$(docker compose -f packages/core/tests/fixtures/db/docker-compose.yml ps --format json | tr -d '\r' || true)
            pg_ok=$(echo "$status" | grep -c '"Service":"postgres".*"Health":"healthy"' || true)
            mysql_ok=$(echo "$status" | grep -c '"Service":"mysql".*"Health":"healthy"' || true)
            if [ "$pg_ok" = "1" ] && [ "$mysql_ok" = "1" ]; then
              echo "Both databases healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Timed out waiting for databases to become healthy"
          docker compose -f packages/core/tests/fixtures/db/docker-compose.yml ps
          docker compose -f packages/core/tests/fixtures/db/docker-compose.yml logs --tail=100
          exit 1

      - name: Typecheck
        run: bun run typecheck

      - name: DB integration tests (Postgres + MySQL)
        env:
          DB_TEST_POSTGRES_URL: postgres://test:test@localhost:5433/testdb
          DB_TEST_MYSQL_URL: mysql://test:test@localhost:3307/testdb
        run: bun test packages/core/tests/db/db-postgres.test.ts packages/core/tests/db/db-mysql.test.ts --retry=2

      - name: Collect compose logs on failure
        if: failure()
        run: |
          mkdir -p .db-integration-logs
          docker compose -f packages/core/tests/fixtures/db/docker-compose.yml logs postgres \
            > .db-integration-logs/postgres.log 2>&1 || true
          docker compose -f packages/core/tests/fixtures/db/docker-compose.yml logs mysql \
            > .db-integration-logs/mysql.log 2>&1 || true
          docker compose -f packages/core/tests/fixtures/db/docker-compose.yml ps \
            > .db-integration-logs/ps.txt 2>&1 || true

      - name: Upload compose logs
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: db-integration-logs
          path: .db-integration-logs/
          if-no-files-found: warn
          retention-days: 7

      - name: Tear down compose
        if: always()
        run: docker compose -f packages/core/tests/fixtures/db/docker-compose.yml down -v

  official-demo:
    name: Official Demo (ubuntu-latest, Bun latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run test:demo

  smoke:
    name: Smoke (ubuntu-latest, Bun latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run test:smoke

  performance-budget:
    name: Performance Budget (ubuntu-latest, Bun latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run perf:baseline:check
      - run: bunx playwright install chromium
      - run: bun run perf:ci
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: perf-latest
          path: .perf/latest
          if-no-files-found: warn

  e2e:
    name: E2E (Playwright) — ${{ matrix.demo }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        demo: [todo-app, ai-chat]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium
      - name: Build demo app
        working-directory: demo/${{ matrix.demo }}
        run: bun run build
      - name: Start demo server
        working-directory: demo/${{ matrix.demo }}
        run: bun run start &
      - name: Wait for server
        run: |
          for i in {1..60}; do
            if curl -sf http://localhost:3333 > /dev/null; then
              echo "Server ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start within 60s"
          exit 1
      - name: Run E2E tests
        working-directory: demo/${{ matrix.demo }}
        env:
          CI: "true"
          BASE_URL: http://localhost:3333
        run: bun run test:e2e:ci
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report-${{ matrix.demo }}
          path: demo/${{ matrix.demo }}/.mandu/reports/
          retention-days: 7
          if-no-files-found: warn
