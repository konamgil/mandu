name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality (${{ matrix.os }}, Bun latest)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      # Randomized run with bundler tests gated off (Bun.build cross-worker
      # races make them flaky under --randomize — they're run sequentially
      # in the next step).
      - name: Tests (randomized, bundler gated)
        run: bun run test:core -- --randomize --retry=2 --seed=${{ github.run_id }}
        env:
          MANDU_SKIP_BUNDLER_TESTS: "1"
      - name: Tests (bundler, sequential)
        run: bun test packages/core/src/bundler/build.test.ts packages/core/tests/bundler/dev-common-dir.test.ts --retry=2
      - run: bun run test:cli -- --randomize --retry=2 --seed=${{ github.run_id }}
      - run: bun run test:mcp -- --randomize --retry=2 --seed=${{ github.run_id }}
      - run: bun run test:ate -- --randomize --retry=2 --seed=${{ github.run_id }}

  compatibility:
    name: Compatibility (ubuntu-latest, Bun 1.3.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - name: Tests (randomized, bundler gated)
        run: bun run test:core -- --randomize --retry=2 --seed=${{ github.run_id }}
        env:
          MANDU_SKIP_BUNDLER_TESTS: "1"
      - name: Tests (bundler, sequential)
        run: bun test packages/core/src/bundler/build.test.ts packages/core/tests/bundler/dev-common-dir.test.ts --retry=2
      - run: bun run test:cli -- --randomize --retry=2 --seed=${{ github.run_id }}
      - run: bun run test:mcp -- --randomize --retry=2 --seed=${{ github.run_id }}
      - run: bun run test:ate -- --randomize --retry=2 --seed=${{ github.run_id }}

  official-demo:
    name: Official Demo (ubuntu-latest, Bun latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run test:demo

  smoke:
    name: Smoke (ubuntu-latest, Bun latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run test:smoke

  performance-budget:
    name: Performance Budget (ubuntu-latest, Bun latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run perf:baseline:check
      - run: bunx playwright install chromium
      - run: bun run perf:ci
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: perf-latest
          path: .perf/latest
          if-no-files-found: warn

  e2e:
    name: E2E (Playwright) — ${{ matrix.demo }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        demo: [todo-app, ai-chat]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium
      - name: Build demo app
        working-directory: demo/${{ matrix.demo }}
        run: bun run build
      - name: Start demo server
        working-directory: demo/${{ matrix.demo }}
        run: bun run start &
      - name: Wait for server
        run: |
          for i in {1..60}; do
            if curl -sf http://localhost:3333 > /dev/null; then
              echo "Server ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start within 60s"
          exit 1
      - name: Run E2E tests
        working-directory: demo/${{ matrix.demo }}
        env:
          CI: "true"
          BASE_URL: http://localhost:3333
        run: bun run test:e2e:ci
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.demo }}
          path: demo/${{ matrix.demo }}/.mandu/reports/
          retention-days: 7
          if-no-files-found: warn
